"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ ](bg:#9A348E)\
$os\
$username\
[](fg:#9A348E bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[](fg:#86BBD8 bg:#DA627D)\
$directory\
$character\
"""

right_format = """
[](fg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#33658A bg:#FCA17D)\
$time\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bold fg:#FFFFFF bg:#9A348E"
style_root = "bold fg:#FFFFFF bg:#9A348E"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bold fg:#FFFFFF bg:#9A348E"
disabled = true # Disabled by default

[directory]
style = "fg:#FFFFFF bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[c]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "fg:#FFFFFF bg:#06969A"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "fg:#FFFFFF bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:#FFFFFF bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "fg:#FFFFFF bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[character]
format = '[$symbol]($style) '
vimcmd_symbol = '[](fg:#DA627D bg:#258BD2)[ NORMAL ](bold fg:#FFFFFF bg:#258BD2)[](fg:#258BD2)'
vimcmd_replace_one_symbol = '[](fg:#DA627D bg:#DD322F)[ REPLACE ](fg:#FFFFFF bg:#DD322F)[](fg:#DD322F)'
vimcmd_replace_symbol = '[](fg:#DA627D bg:#DD322F)[ REPLACE ](fg:#FFFFFF bg:#DD322F)[](fg:#DD322F)'
vimcmd_visual_symbol = '[](fg:#DA627D bg:#D23782)[ VISUAL ](fg:#FFFFFF bg:#D23782)[](fg:#D23782)'
success_symbol = '[](fg:#DA627D bg:#859803)[ INSERT ](fg:#FFFFFF bg:#859803)[](fg:#859803)'
error_symbol = '[](fg:#DA627D bg:#DD322F)[ INSERT ](fg:#FFFFFF bg:#DD322F)[](fg:#DD322F)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:#FFFFFF bg:#33658A"
format = '[ ♥ $time ]($style)'

