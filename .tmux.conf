setenv -g TMUX_PLUGIN_MANAGER_PATH '$HOME/.tmux/plugins/'
if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
    ~/.tmux/plugins/tpm/bin/install_plugins'"

set-option -g @plugin 'hiroppy/tmux-agent-sidebar'
set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'tmux-plugins/tmux-continuum'

# 自動復帰をオン
set-option -g @continuum-restore 'on'


set-option -g prefix C-t
unbind r
bind r source-file ~/.tmux.conf
set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",$TERM:Tc"
run-shell "powerline-daemon -q"
source $HOME/dotfiles/powerline/powerline/bindings/tmux/powerline.conf
set-option -g base-index 1
set-option -g renumber-windows on
set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi
set-option -sg escape-time 10

set-option -g mouse on
set-option -g focus-events on

set-option -g default-shell /opt/homebrew/bin/fish
set -g default-command /opt/homebrew/bin/fish

## copy to clipboard
set -s copy-command 'pbcopy'
if-shell "which pbcopy" 'bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"' ''
if-shell "which xsel"   'bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"' ''


bind-key C-p paste-buffer
bind-key C-y copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
# split
bind-key s split-window -v
bind-key v split-window -h
# ペインリサイズ関連Vi風
bind-key -r C-h resize-pane -L 6
bind-key -r C-l resize-pane -R 6
bind-key -r C-j resize-pane -D 6
bind-key -r C-k resize-pane -U 6
bind-key C-z resize-pane -Z
bind-key K kill-pane
bind-key C-x kill-pane
bind-key X kill-window
bind-key C-b kill-session

# ペイン番号表示
bind-key i display-panes

bind-key    c      new-window -c "#{pane_current_path}"
bind-key    C-c    new-window -c "#{pane_current_path}"
bind-key    v      split-window -h -c "#{pane_current_path}"
bind-key    C-v    split-window -h -c "#{pane_current_path}"
bind-key    s      split-window -v -c "#{pane_current_path}"
bind-key    C-s    split-window -v -c "#{pane_current_path}"
bind-key    C-r    choose-tree -s
bind-key    j      next-window
bind-key    C-j    next-window
bind-key    k      previous-window
bind-key    C-k    previous-window

bind-key -n C-BTab  previous-window
bind-key -n C-Tab next-window

bind-key y run-shell '\
  tmux display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
    "tmux new-session \"bash ~/.config/tmux/yazi-popup.sh #{pane_id}\" \
      \\; set status off \
      \\; set detach-on-destroy on"'
bind-key g display-popup -d '#{pane_current_path}' -w90% -h90% -E "tig status"
bind-key C split-window -h -c "#{pane_current_path}" -l 35% \; send-keys "claude --ide" C-m

# vim + tmux
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ページスクロール
bind-key -Tcopy-mode-vi J send-keys -X page-down
bind-key -Tcopy-mode-vi K send-keys -X page-up

# layout
set-window-option -g other-pane-height 15
set-window-option -g other-pane-width 100
bind-key -r V select-layout main-vertical \; swap-pane -s : -t 1 \; select-pane -t 1 \; resize-pane -R 9
bind-key -r H select-layout main-horizontal \; swap-pane -s : -t 1 \; select-pane -t 1 \; resize-pane -D 18
bind-key J choose-tree -w "join-pane -h -t '%%'"

# window
bind-key -r h swap-window -t -1 \; select-window -t -1
bind-key -r k swap-window -t +1 \; select-window -t +1

# synchronize
bind-key E setw synchronize-panes on
bind-key e setw synchronize-panes off

# window rename
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Sidebar
set -g @sidebar_key t                    # keybinding (default: e)
set -g @sidebar_width 30                 # width in columns or % (default: 15%)

# Colors (256-color palette numbers) - light background theme
set -g @sidebar_color_running 28          # running icon (dark green)
set -g @sidebar_color_waiting 166         # waiting icon (dark orange)
set -g @sidebar_color_idle 245           # idle icon (medium gray)
set -g @sidebar_color_error 160          # error icon (dark red)
set -g @sidebar_color_border 249          # box border (light gray)
set -g @sidebar_color_border_active 30   # active group border (dark cyan)
set -g @sidebar_color_session 25          # session name (dark blue)
set -g @sidebar_color_agent_claude 131    # Claude brand color (dark terracotta)
set -g @sidebar_color_agent_codex 91     # Codex brand color (dark purple)
set -g @sidebar_color_text_active 32     # text for running/waiting (black)
set -g @sidebar_color_text_muted 242      # text for idle (dark gray)
set -g @sidebar_color_wait_reason 166     # wait reason text (dark orange)
set -g @sidebar_color_path 232            # directory path (black)
set -g @sidebar_color_selection 254       # selected row background (very light gray)
set -g @sidebar_color_branch 23          # git branch name (dark teal)
set -g @sidebar_prompt_lines 1           # max prompt display lines (default: 3)
set -g @sidebar_activity_lines 8         # max activity log entries (default: 8)

run-shell ~/.tmux/plugins/tmux-agent-sidebar/tmux-agent-sidebar.tmux

run '~/.tmux/plugins/tpm/tpm'
